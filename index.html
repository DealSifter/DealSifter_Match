<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://nominatim.openstreetmap.org https://photon.komoot.io https://geocode.arcgis.com https://server.arcgisonline.com https://services.arcgisonline.com https://hazards.fema.gov https://tile.openstreetmap.org https://*.basemaps.cartocdn.com https://geocoding.geo.census.gov; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="DealSifter – Connect with real estate professionals, discover deals, and grow your network." />
    <meta name="theme-color" content="#f6fbfb" />
    <meta property="og:title" content="DealSifter" />
    <meta property="og:description" content="Real estate networking & deal discovery platform." />
    <meta property="og:type" content="website" />
    <script>
      (function(){ var t = localStorage.getItem('ds_theme') || 'light'; document.documentElement.dataset.theme = t; })()
    </script>
    <script>
      (function(){
        var ua = navigator.userAgent || '';
        var isIOS = /iPad|iPhone|iPod/.test(ua);
        var match = ua.match(/OS ([0-9]+)_/);
        var major = match && match[1] ? parseInt(match[1], 10) : null;
        if (isIOS && major && major < 12) {
          document.documentElement.className += ' ds-unsupported-ios';
        }
      })()
    </script>
    <style>
      :root {
        --ds-splash-bg: #f6fbfb;
        --ds-splash-bg-soft: #eaf9f8;
        --ds-splash-text: #10213f;
        --ds-splash-accent: #35cac9;
        --ds-splash-glow: rgba(53, 202, 201, 0.28);
      }

      [data-theme="dark"] {
        --ds-splash-bg: #0b1514;
        --ds-splash-bg-soft: #12231f;
        --ds-splash-text: #f1f8f7;
        --ds-splash-glow: rgba(53, 202, 201, 0.36);
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #f6fbfb;
        background:
          radial-gradient(circle at 50% 40%, var(--ds-splash-glow), transparent 34%),
          linear-gradient(145deg, var(--ds-splash-bg), var(--ds-splash-bg-soft));
        color: #10213f;
        color: var(--ds-splash-text);
      }

      body {
        min-width: 320px;
        overflow-x: hidden;
      }

      .ds-initial-loader {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        inset: 0;
        z-index: 2147482000;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        background: #f6fbfb;
        background:
          radial-gradient(circle at 50% 40%, var(--ds-splash-glow), transparent 34%),
          linear-gradient(145deg, var(--ds-splash-bg), var(--ds-splash-bg-soft));
      }

      .ds-initial-loader-inner {
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-box-direction: normal;
        -ms-flex-direction: column;
        flex-direction: column;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        gap: 14px;
        background: transparent;
        border: 0;
        box-shadow: none;
      }

      .ds-initial-logo {
        width: 66px;
        height: 66px;
        object-fit: contain;
        filter: drop-shadow(0 0 14px var(--ds-splash-glow));
        animation: ds-splash-spin 1.15s linear infinite;
      }

      .ds-initial-text {
        color: #35cac9;
        color: var(--ds-splash-accent);
        font: 800 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        text-shadow: 0 0 12px var(--ds-splash-glow);
        animation: ds-splash-text 1.35s ease-in-out infinite;
      }

      .ds-ios-unsupported {
        display: none;
        max-width: 520px;
        margin: 0 auto;
        padding: 44px 24px;
        color: #10213f;
        font: 700 15px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .ds-ios-unsupported img {
        width: 86px;
        height: 86px;
        object-fit: contain;
        margin-bottom: 14px;
      }

      .ds-ios-unsupported strong {
        display: block;
        margin-bottom: 8px;
        font-size: 20px;
      }

      .ds-ios-unsupported p {
        margin: 8px 0;
        font-weight: 600;
        color: #38506b;
      }

      .ds-unsupported-ios,
      .ds-unsupported-ios body,
      .ds-unsupported-ios #root {
        background: #f6fbfb;
      }

      .ds-unsupported-ios .ds-initial-loader {
        display: none;
      }

      .ds-unsupported-ios .ds-ios-unsupported {
        display: block;
      }

      @keyframes ds-splash-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes ds-splash-text {
        0%, 100% { opacity: 0.84; }
        50% { opacity: 1; }
      }
    </style>
    <title>DealSifter</title>
  </head>
  <body>
    <div id="root">
      <div class="ds-ios-unsupported" role="alert">
        <img src="/logo.png" alt="DealSifter" />
        <strong>Safari/iOS update required</strong>
        <p>DealSifter Match needs iOS/iPadOS 12 or newer to run correctly.</p>
        <p>Atualize o iPad ou acesse por um dispositivo mais recente para usar o app.</p>
      </div>
      <div class="ds-initial-loader" role="status" aria-live="polite" aria-label="Loading DealSifter">
        <div class="ds-initial-loader-inner">
          <img class="ds-initial-logo" src="/logo.png" alt="DealSifter" />
          <div class="ds-initial-text">Loading DealSifter...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
